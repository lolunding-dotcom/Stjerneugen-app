<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⭐ Stjerneugen</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --radius: 20px;
  --shadow: 0 6px 24px rgba(0,0,0,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
body { font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; }
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── THEMES ── */
body.theme-football { --bg: #1a6b1a; --bg2: #0f4f0f; --accent: #f0c000; --text: #fff; --card: rgba(255,255,255,0.12); --currency: "bolde ⚽"; }
body.theme-unicorn  { --bg: #c060d0; --bg2: #7030a0; --accent: #ffe0ff; --text: #fff; --card: rgba(255,255,255,0.15); --currency: "støv ✨"; }
body.theme-pirate   { --bg: #1a3a5c; --bg2: #0d1f30; --accent: #f0a000; --text: #fff; --card: rgba(255,255,255,0.12); --currency: "mønter 🪙"; }
body.theme-rocket   { --bg: #0a0a2e; --bg2: #050518; --accent: #00e5ff; --text: #fff; --card: rgba(255,255,255,0.10); --currency: "krystaller 💎"; }
body.theme-superhero{ --bg: #1a0030; --bg2: #0d0020; --accent: #ff2060; --text: #fff; --card: rgba(255,255,255,0.12); --currency: "energi ⚡"; }
body.theme-none     { --bg: #f0ebff; --bg2: #d8d0f8; --accent: #ffb800; --text: #2d2350; --card: rgba(255,255,255,0.85); }

body { background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%); color: var(--text); transition: background 0.5s; }

/* ── LOGIN ── */
#login {
  align-items: center; justify-content: center;
  padding: 40px 24px; gap: 28px;
  background: linear-gradient(160deg, #1a0a3a 0%, #0d0020 100%);
  min-height: 100vh;
}
.login-title {
  font-family: 'Fredoka One', cursive;
  font-size: 48px; letter-spacing: 1px; text-align: center;
  color: #fff; text-shadow: 0 0 30px rgba(255,180,0,0.6);
}
.login-subtitle { color: rgba(255,255,255,0.6); font-size: 16px; text-align: center; margin-top: -16px; }
.child-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
.child-card {
  border: none; border-radius: 24px; padding: 28px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  position: relative; overflow: hidden;
}
.child-card:active { transform: scale(0.94); }
.child-card.c-w { background: linear-gradient(135deg, #ff6b35, #f7931e); box-shadow: 0 8px 24px rgba(255,107,53,0.4); }
.child-card.c-l { background: linear-gradient(135deg, #a855f7, #ec4899); box-shadow: 0 8px 24px rgba(168,85,247,0.4); }
.child-avatar { font-size: 56px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
.child-name { font-family: 'Fredoka One', cursive; font-size: 22px; color: #fff; }
.child-age { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 700; }
.child-theme-badge {
  position: absolute; bottom: 10px; right: 12px;
  font-size: 20px; opacity: 0.7;
}
.login-footer { display: flex; gap: 12px; }
.ghost-btn {
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 50px; padding: 10px 22px;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
  color: #fff; cursor: pointer; backdrop-filter: blur(8px);
  transition: background 0.15s;
}
.ghost-btn:active { background: rgba(255,255,255,0.25); }

/* ── PIN ── */
#pin {
  align-items: center; justify-content: center;
  padding: 40px 24px; gap: 20px;
  background: linear-gradient(160deg, #1a0a3a 0%, #0d0020 100%);
}
.pin-avatar { font-size: 80px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3)); }
#pin h2 { font-family: 'Fredoka One', cursive; font-size: 30px; color: #fff; }
#pin p { color: rgba(255,255,255,0.6); }
.pin-dots { display: flex; gap: 16px; margin: 4px 0; }
.pin-dot { width: 20px; height: 20px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.4); transition: all 0.15s; }
.pin-dot.filled { background: #ffb800; border-color: #ffb800; transform: scale(1.3); box-shadow: 0 0 12px rgba(255,184,0,0.6); }
.numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 14px; }
.num-btn {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2);
  font-size: 28px; font-weight: 800; font-family: 'Nunito', sans-serif; color: #fff;
  cursor: pointer; transition: transform 0.1s, background 0.1s;
  backdrop-filter: blur(8px);
}
.num-btn:active { transform: scale(0.88); background: rgba(255,184,0,0.4); }
.num-btn.invisible { background: transparent; border: none; pointer-events: none; }
.error-msg { color: #ff6b6b; font-weight: 800; min-height: 22px; font-size: 15px; }

/* ── THEME PICKER ── */
#theme-picker {
  padding: 0 0 40px; overflow-y: auto;
}
.picker-header {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,0,0,0.2); backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.picker-header h2 { font-family: 'Fredoka One', cursive; font-size: 22px; }
.picker-intro { padding: 16px 20px 8px; color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 600; }
.theme-grid { display: flex; flex-direction: column; gap: 14px; padding: 8px 16px 16px; }
.theme-option {
  border: none; border-radius: 24px; padding: 20px 22px;
  display: flex; align-items: center; gap: 18px;
  cursor: pointer; transition: transform 0.15s;
  text-align: left; position: relative; overflow: hidden;
}
.theme-option:active { transform: scale(0.97); }
.theme-option.selected::after {
  content: '✓'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  font-size: 22px; font-weight: 900;
}
.theme-football  { background: linear-gradient(135deg, #1d7a1d, #0a5a0a); box-shadow: 0 6px 20px rgba(0,100,0,0.35); }
.theme-unicorn   { background: linear-gradient(135deg, #c060d0, #7030a0); box-shadow: 0 6px 20px rgba(150,50,200,0.35); }
.theme-pirate    { background: linear-gradient(135deg, #1a3a5c, #8b4513); box-shadow: 0 6px 20px rgba(20,40,80,0.4); }
.theme-rocket    { background: linear-gradient(135deg, #0a0a40, #000828); box-shadow: 0 6px 20px rgba(0,0,100,0.4); }
.theme-superhero { background: linear-gradient(135deg, #1a0050, #600020); box-shadow: 0 6px 20px rgba(80,0,80,0.4); }
.theme-icon { font-size: 48px; flex-shrink: 0; }
.theme-info { flex: 1; }
.theme-name { font-family: 'Fredoka One', cursive; font-size: 22px; color: #fff; display: block; }
.theme-desc { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 600; margin-top: 2px; display: block; }
.theme-currency { font-size: 12px; color: rgba(255,255,255,0.55); font-weight: 700; margin-top: 4px; display: block; }
.confirm-btn {
  margin: 4px 16px 0;
  width: calc(100% - 32px);
  padding: 18px; border-radius: 50px; border: none;
  font-family: 'Fredoka One', cursive; font-size: 20px; color: #fff;
  background: linear-gradient(135deg, #ffb800, #ff6b35);
  box-shadow: 0 6px 20px rgba(255,100,0,0.4);
  cursor: pointer; transition: transform 0.1s;
}
.confirm-btn:active { transform: scale(0.97); }

/* ── DASHBOARD ── */
#dashboard { background: transparent; }
.dash-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: rgba(0,0,0,0.25); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.dash-title { display: flex; align-items: center; gap: 10px; }
.dash-avatar-sm { font-size: 32px; }
.dash-title h2 { font-family: 'Fredoka One', cursive; font-size: 20px; color: #fff; }
.dash-goal-sm { color: rgba(255,255,255,0.65); font-size: 12px; font-weight: 700; display: block; }
.icon-btn {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%; width: 44px; height: 44px; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #fff; backdrop-filter: blur(8px);
}

/* PROGRESS HERO */
.progress-hero {
  padding: 28px 22px 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.currency-display {
  display: flex; align-items: center; gap: 12px;
}
.currency-icon { font-size: 56px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.currency-numbers { flex: 1; }
.currency-count { font-family: 'Fredoka One', cursive; font-size: 64px; line-height: 1; color: var(--accent); text-shadow: 0 0 20px rgba(255,200,0,0.4); }
.currency-label { color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 700; }
.progress-bar { width: 100%; height: 14px; border-radius: 50px; background: rgba(255,255,255,0.15); overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent)); border-radius: 50px; transition: width 0.4s ease; box-shadow: 0 0 16px rgba(255,200,0,0.5); }

/* TASK LIST */
.task-list { display: flex; flex-direction: column; gap: 12px; padding: 0 16px 24px; }
.task-card {
  background: var(--card); backdrop-filter: blur(8px);
  border-radius: 16px; padding: 18px 16px;
  display: flex; align-items: center; gap: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: all 0.2s;
  position: relative;
}
.task-card:active { transform: scale(0.98); background: rgba(255,255,255,0.2); }
.task-card.done { opacity: 0.55; }
.task-card.done .task-text { text-decoration: line-through; color: rgba(255,255,255,0.5); }
.task-checkbox { flex-shrink: 0; width: 28px; height: 28px; border-radius: 10px; border: 2.5px solid rgba(255,255,255,0.3); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
.task-card.done .task-checkbox { background: var(--accent); border-color: var(--accent); }
.task-content { flex: 1; }
.task-text { font-size: 16px; font-weight: 600; color: #fff; }
.task-meta { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.task-reward { font-family: 'Fredoka One', cursive; font-size: 18px; flex-shrink: 0; }

/* ADD TASK */
.add-task-section {
  padding: 0 16px 24px;
}
.add-task-input {
  width: 100%; padding: 16px 18px; border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.15); background: var(--card);
  color: #fff; font-family: 'Nunito', sans-serif; font-size: 15px;
  backdrop-filter: blur(8px); transition: border 0.2s;
}
.add-task-input::placeholder { color: rgba(255,255,255,0.4); }
.add-task-input:focus { outline: none; border-color: var(--accent); }
.add-task-buttons { display: flex; gap: 10px; margin-top: 12px; }
.add-task-buttons button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.add-task-buttons button:active { transform: scale(0.95); }
.btn-add { background: var(--accent); color: var(--bg); }
.btn-cancel { background: rgba(255,255,255,0.15); color: #fff; }

/* GAME */
#game {
  flex-direction: column; gap: 20px; padding: 20px;
  align-items: center; justify-content: center; text-align: center;
}
#game h2 { font-family: 'Fredoka One', cursive; font-size: 32px; }
#game p { color: rgba(255,255,255,0.7); margin: 8px 0; }
#game-canvas { border-radius: 16px; background: #000; margin: 20px 0; max-width: 100%; height: auto; display: block; }
.game-info { color: rgba(255,255,255,0.9); font-weight: 700; font-size: 18px; min-height: 40px; }
.game-buttons { display: flex; gap: 12px; justify-content: center; }
.game-buttons button { padding: 14px 28px; border-radius: 50px; border: none; font-family: 'Fredoka One', cursive; font-size: 18px; cursor: pointer; transition: transform 0.1s; }
.game-buttons button:active { transform: scale(0.95); }
#play-btn { background: var(--accent); color: var(--bg); font-weight: 900; }
#back-btn { background: rgba(255,255,255,0.2); color: #fff; }
#play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* CONFETTI */
#confetti-canvas { position: fixed; top: 0; left: 0; pointer-events: none; }
</style>
</head>
<body>

<div class="app">

<!-- LOGIN SCREEN -->
<div id="login" class="screen active">
  <div>
    <h1 class="login-title">⭐ Stjerneugen</h1>
    <p class="login-subtitle">Hvem er det?</p>
  </div>
  <div class="child-grid" id="child-grid"></div>
  <div class="login-footer">
    <button class="ghost-btn" id="add-child-btn">➕ Tilføj barn</button>
    <button class="ghost-btn" id="settings-btn">⚙️ Indstillinger</button>
  </div>
</div>

<!-- PIN SCREEN -->
<div id="pin" class="screen">
  <div style="text-align: center;">
    <div class="pin-avatar" id="pin-avatar"></div>
    <h2 id="pin-name"></h2>
    <p>Indtast PIN-kode</p>
  </div>
  <div class="pin-dots" id="pin-dots"></div>
  <div class="error-msg" id="error-msg"></div>
  <div class="numpad" id="numpad"></div>
  <button class="ghost-btn" onclick="goBack()">← Tilbage</button>
</div>

<!-- THEME PICKER SCREEN -->
<div id="theme-picker" class="screen">
  <div class="picker-header">
    <button class="ghost-btn" onclick="goBack()">← Tilbage</button>
    <h2>Vælg tema 🎨</h2>
  </div>
  <p class="picker-intro">Hvilket tema kunne du godt lide?</p>
  <div class="theme-grid" id="theme-grid"></div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboard" class="screen">
  <div class="dash-header">
    <div class="dash-title">
      <span class="dash-avatar-sm" id="dash-avatar"></span>
      <div>
        <h2 id="dash-name"></h2>
        <span class="dash-goal-sm" id="dash-goal"></span>
      </div>
    </div>
    <button class="icon-btn" onclick="logout()">🚪</button>
  </div>

  <div class="progress-hero">
    <div class="currency-display">
      <div class="currency-icon" id="currency-icon"></div>
      <div class="currency-numbers">
        <div class="currency-count" id="currency-count">0</div>
        <div class="currency-label" id="currency-label"></div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="add-task-section" id="add-task-section" style="display: none;">
    <input type="text" class="add-task-input" id="new-task-input" placeholder="Ny pligt...">
    <div class="add-task-buttons">
      <button class="btn-add" onclick="addTask()">➕ Tilføj</button>
      <button class="btn-cancel" onclick="toggleAddTask()">Annuller</button>
    </div>
  </div>

  <button class="ghost-btn" id="toggle-add-btn" style="margin: 0 16px 24px;" onclick="toggleAddTask()">➕ Ny pligt</button>
  <button class="ghost-btn" id="play-game-btn" style="margin: 0 16px 24px; background: linear-gradient(135deg, #ffb800, #ff6b35);" onclick="startGame()">🎮 Afslut med spil!</button>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
  <h2 id="game-title"></h2>
  <p id="game-desc"></p>
  <canvas id="game-canvas" width="400" height="600"></canvas>
  <div class="game-info" id="game-info"></div>
  <div class="game-buttons">
    <button class="game-buttons button" id="play-btn" onclick="restartGame()" style="display: none;">🔄 Spil igen</button>
    <button class="game-buttons button" id="back-btn" onclick="endGame()">← Tilbage</button>
  </div>
</div>

</div>

<canvas id="confetti-canvas"></canvas>

<script>
// ════════════════════════════════════════
// DATA & STATE
// ════════════════════════════════════════
const family = {
  children: [
    { id: 1, name: 'Alma', emoji: '🎀', avatar: '👧', age: 6, pin: '1234', theme: 'unicorn', color: 'c-w', currency: 0, goal: 5, tasks: [] },
    { id: 2, name: 'Lasse', emoji: '⚽', avatar: '👦', age: 9, pin: '5678', theme: 'football', color: 'c-l', currency: 0, goal: 8, tasks: [] }
  ]
}

let currentChild = null
let gameLoop = null

// ════════════════════════════════════════
// LOCAL STORAGE
// ════════════════════════════════════════
function saveFamilyData() {
  localStorage.setItem('family', JSON.stringify(family))
}

function loadFamilyData() {
  const stored = localStorage.getItem('family')
  if(stored) Object.assign(family, JSON.parse(stored))
}

function saveChild() {
  saveFamilyData()
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function goBack() {
  showScreen('login')
}

function logout() {
  currentChild = null
  showScreen('login')
}

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
function updateLoginBadges() {
  const grid = document.getElementById('child-grid')
  grid.innerHTML = ''
  family.children.forEach(child => {
    const card = document.createElement('button')
    card.className = `child-card ${child.color}`
    card.innerHTML = `
      <div class="child-avatar">${child.avatar}</div>
      <div class="child-name">${child.name}</div>
      <div class="child-age">${child.age} år</div>
      <div class="child-theme-badge">${child.emoji}</div>
    `
    card.onclick = () => goToPin(child)
    grid.appendChild(card)
  })
}

function goToPin(child) {
  currentChild = child
  document.getElementById('pin-avatar').textContent = child.avatar
  document.getElementById('pin-name').textContent = child.name
  document.getElementById('pin-dots').innerHTML = ''
  document.getElementById('error-msg').textContent = ''
  for(let i=0;i<child.pin.length;i++) {
    document.getElementById('pin-dots').appendChild(document.createElement('div')).className = 'pin-dot'
  }
  renderNumpad()
  showScreen('pin')
}

function renderNumpad() {
  const numpad = document.getElementById('numpad')
  numpad.innerHTML = ''
  const nums = [1,2,3,4,5,6,7,8,9,'','0,'']
  const allNums = [...nums.slice(0,9), '', 0, '']
  allNums.forEach(n => {
    const btn = document.createElement('button')
    btn.className = 'num-btn' + (n === '' ? ' invisible' : '')
    btn.textContent = n
    if(n !== '' && n !== ' ') {
      btn.onclick = () => enterPin(n)
    }
    numpad.appendChild(btn)
  })
}

let pinAttempt = ''
function enterPin(digit) {
  pinAttempt += digit
  updatePinDots()
  if(pinAttempt.length === currentChild.pin.length) {
    if(pinAttempt === currentChild.pin) {
      pinAttempt = ''
      applyTheme(currentChild.theme)
      showScreen('dashboard')
      updateDashboard()
    } else {
      document.getElementById('error-msg').textContent = '❌ Forkert PIN'
      pinAttempt = ''
      updatePinDots()
      setTimeout(() => {
        document.getElementById('error-msg').textContent = ''
      }, 2000)
    }
  }
}

function updatePinDots() {
  const dots = document.querySelectorAll('.pin-dot')
  dots.forEach((d,i) => {
    if(i < pinAttempt.length) d.classList.add('filled')
    else d.classList.remove('filled')
  })
}

// ════════════════════════════════════════
// THEMES
// ════════════════════════════════════════
function applyTheme(themeName) {
  document.body.className = `theme-${themeName}`
}

function updateThemePicker() {
  const themes = [
    { id: 'football', name: '⚽ Fodbold', desc: 'Mål og bolde', icon: '🏟️', currency: 'bolde ⚽' },
    { id: 'unicorn', name: '✨ Enhjørning', desc: 'Glitter og drømme', icon: '🦄', currency: 'støv ✨' },
    { id: 'pirate', name: '🏴‍☠️ Pirat', desc: 'Skat og eventyr', icon: '🏴‍☠️', currency: 'mønter 🪙' },
    { id: 'rocket', name: '🚀 Rumrejse', desc: 'Krystaller og stjerner', icon: '🚀', currency: 'krystaller 💎' },
    { id: 'superhero', name: '🦸 Superhelt', desc: 'Energi og kraft', icon: '🦸', currency: 'energi ⚡' },
    { id: 'none', name: '☀️ Sol', desc: 'Lyst og venligt', icon: '☀️', currency: 'stjerner ⭐' }
  ]
  const grid = document.getElementById('theme-grid')
  grid.innerHTML = ''
  themes.forEach(t => {
    const btn = document.createElement('button')
    btn.className = `theme-option theme-${t.id}` + (currentChild.theme === t.id ? ' selected' : '')
    btn.innerHTML = `
      <div class="theme-icon">${t.icon}</div>
      <div class="theme-info">
        <span class="theme-name">${t.name}</span>
        <span class="theme-desc">${t.desc}</span>
        <span class="theme-currency">${t.currency}</span>
      </div>
    `
    btn.onclick = () => {
      currentChild.theme = t.id
      saveChild()
      document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('selected'))
      btn.classList.add('selected')
      applyTheme(t.id)
    }
    grid.appendChild(btn)
  })
}

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
function updateDashboard() {
  document.getElementById('dash-avatar').textContent = currentChild.avatar
  document.getElementById('dash-name').textContent = currentChild.name
  document.getElementById('dash-goal').textContent = `Mål: ${currentChild.currency}/${currentChild.goal}`
  document.getElementById('currency-icon').textContent = ['⚽','✨','🪙','💎','⚡','⭐']['football,unicorn,pirate,rocket,superhero,none'.split(',').indexOf(currentChild.theme)]
  const themeInfo = { football: '⚽', unicorn: '✨', pirate: '🪙', rocket: '💎', superhero: '⚡', none: '⭐' }
  document.getElementById('currency-label').textContent = `${currentChild.currency} ${themeInfo[currentChild.theme]}`
  document.getElementById('currency-count').textContent = currentChild.currency
  const progressPct = Math.min(100, (currentChild.currency / currentChild.goal) * 100)
  document.getElementById('progress-fill').style.width = progressPct + '%'
  renderTasks()
  document.getElementById('toggle-add-btn').style.display = 'block'
  document.getElementById('add-task-section').style.display = 'none'
  if(currentChild.currency >= currentChild.goal) {
    document.getElementById('play-game-btn').style.display = 'block'
  } else {
    document.getElementById('play-game-btn').style.display = 'none'
  }
}

function renderTasks() {
  const list = document.getElementById('task-list')
  list.innerHTML = ''
  currentChild.tasks.forEach((task, idx) => {
    const card = document.createElement('div')
    card.className = 'task-card' + (task.done ? ' done' : '')
    card.innerHTML = `
      <div class="task-checkbox">${task.done ? '✓' : ''}</div>
      <div class="task-content">
        <div class="task-text">${task.text}</div>
        <div class="task-meta">${task.date}</div>
      </div>
      <div class="task-reward">${task.reward}</div>
    `
    card.onclick = () => toggleTask(idx)
    list.appendChild(card)
  })
}

function toggleTask(idx) {
  currentChild.tasks[idx].done = !currentChild.tasks[idx].done
  if(currentChild.tasks[idx].done) {
    currentChild.currency += currentChild.tasks[idx].reward.split(' ')[0].length ? parseInt(currentChild.tasks[idx].reward) : 1
  } else {
    currentChild.currency -= currentChild.tasks[idx].reward.split(' ')[0].length ? parseInt(currentChild.tasks[idx].reward) : 1
  }
  saveChild()
  updateDashboard()
  launchConfetti()
}

function toggleAddTask() {
  const section = document.getElementById('add-task-section')
  const btn = document.getElementById('toggle-add-btn')
  section.style.display = section.style.display === 'none' ? 'block' : 'none'
  btn.textContent = section.style.display === 'none' ? '➕ Ny pligt' : '❌ Luk'
  if(section.style.display === 'block') {
    document.getElementById('new-task-input').focus()
  }
}

function addTask() {
  const input = document.getElementById('new-task-input')
  const text = input.value.trim()
  if(text) {
    const today = new Date().toLocaleDateString('da-DK')
    currentChild.tasks.push({ text, date: today, done: false, reward: 1 })
    saveChild()
    input.value = ''
    updateDashboard()
    toggleAddTask()
  }
}

// ════════════════════════════════════════
// GAME
// ════════════════════════════════════════
function startGame() {
  const games = ['football', 'pirate', 'rocket', 'superhero']
  const selectedGame = games[Math.floor(Math.random() * games.length)]
  const gameNames = { football: '⚽ Fodbold', pirate: '🏴‍☠️ Pirat', rocket: '🚀 Rumrejse', superhero: '🦸 Superhelt' }
  const gameDescs = { football: 'Skyd bolde ind i målet!', pirate: 'Sænk piratskkibe!', rocket: 'Undvik asteroider!', superhero: 'Besejr skurkene!' }
  document.getElementById('game-title').textContent = gameNames[selectedGame]
  document.getElementById('game-desc').textContent = gameDescs[selectedGame]
  document.getElementById('game-info').textContent = ''
  document.getElementById('play-btn').style.display = 'none'
  showScreen('game')
  const canvas = document.getElementById('game-canvas')
  const ctx = canvas.getContext('2d')
  if(selectedGame === 'football') runFootball(canvas, ctx, currentChild.currency)
  else if(selectedGame === 'pirate') runPirate(canvas, ctx, currentChild.currency)
  else if(selectedGame === 'rocket') runRocket(canvas, ctx, currentChild.currency)
  else if(selectedGame === 'superhero') runSuperhero(canvas, ctx, currentChild.currency)
}

function restartGame() {
  const canvas = document.getElementById('game-canvas')
  const ctx = canvas.getContext('2d')
  const gameTitle = document.getElementById('game-title').textContent
  const selectedGame = gameTitle.includes('Fodbold') ? 'football' : gameTitle.includes('Pirat') ? 'pirate' : gameTitle.includes('Rumrejse') ? 'rocket' : 'superhero'
  if(gameLoop) cancelAnimationFrame(gameLoop)
  if(selectedGame === 'football') runFootball(canvas, ctx, currentChild.currency)
  else if(selectedGame === 'pirate') runPirate(canvas, ctx, currentChild.currency)
  else if(selectedGame === 'rocket') runRocket(canvas, ctx, currentChild.currency)
  else if(selectedGame === 'superhero') runSuperhero(canvas, ctx, currentChild.currency)
}

function endGame() {
  if(gameLoop) cancelAnimationFrame(gameLoop)
  currentChild.currency = 0
  currentChild.tasks = []
  saveChild()
  showScreen('login')
  updateLoginBadges()
}

// ── FOOTBALL ──
function runFootball(canvas, ctx, power) {
  const W=canvas.width, H=canvas.height
  let ball={x:W/2,y:H/2,vx:0,vy:0,r:10}, goal={x:W/2,y:40,w:80,h:60}, power_up=0
  let score=0, shots=Math.round(5+power*3), shotsLeft=shots, frame=0
  canvas.onmousemove=(e)=>{ const r=canvas.getBoundingClientRect(); ball.x=(e.clientX-r.left)*(W/r.width); ball.y=(e.clientY-r.top)*(H/r.height) }
  canvas.ontouchmove=(e)=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); ball.x=(e.touches[0].clientX-r.left)*(W/r.width); ball.y=(e.touches[0].clientY-r.top)*(H/r.height) }
  canvas.onclick=()=>{ if(shotsLeft>0) { shotsLeft--; ball.vy=-18; power_up=1; launchConfetti() } }
  function draw() {
    frame++; power_up*=0.98
    ctx.fillStyle='#1a6b1a'; ctx.fillRect(0,0,W,H)
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2; ctx.strokeRect(goal.x-goal.w/2,goal.y,goal.w,goal.h)
    ctx.font='40px serif'; ctx.textAlign='center'; ctx.fillText('🥅',goal.x,goal.y+50)
    ball.y+=ball.vy; ball.vy+=0.3
    if(ball.y+ball.r>H) { ball.y=H-ball.r; ball.vy=0 }
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r+power_up*8,0,Math.PI*2); ctx.fillStyle=`rgba(240,192,0,${0.3+power_up*0.5})`; ctx.fill()
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fillStyle='#ffb800'; ctx.fill()
    if(Math.abs(ball.x-goal.x)<goal.w/2 && ball.y<goal.y+goal.h && ball.y>goal.y) { score++; ball.y=H-ball.r; ball.vy=0; launchConfetti() }
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,36)
    ctx.fillStyle='#f0c000'; ctx.font='bold 15px Nunito'; ctx.textAlign='center'
    ctx.fillText(`⚽ ${score} mål · ${shotsLeft} skud tilbage`,W/2,23)
    if(shotsLeft<=0 && ball.vy===0) {
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,H/2-50,W,100)
      ctx.fillStyle='#f0c000'; ctx.font='bold 22px Fredoka One'; ctx.textAlign='center'
      ctx.fillText(`⚽ ${score} mål!`,W/2,H/2-10)
      ctx.fillStyle='#fff'; ctx.font='14px Nunito'; ctx.fillText('Tryk for at spille igen',W/2,H/2+24)
      canvas.onclick=()=>{ shotsLeft=shots; score=0; ball.y=H-ball.r; ball.vy=0 }
    }
    gameLoop=requestAnimationFrame(draw)
  }
  gameLoop=requestAnimationFrame(draw)
}

// ── PIRATE ──
function runPirate(canvas, ctx, power) {
  const W=canvas.width, H=canvas.height
  const shots=Math.round(8+power*8), projectiles=[]
  let shotsLeft=shots, hits=0, ships=[], frame=0
  function spawnShip() { ships.push({x:Math.random()*(W-40), y:-50, w:40, h:30, hit:false}) }
  for(let i=0;i<3;i++) spawnShip()
  canvas.onclick=(e)=>{ if(shotsLeft<=0) return; const r=canvas.getBoundingClientRect(); const ty=(e.clientY-r.top)*(H/r.height); projectiles.push({x:W/2,y:H-60,ty,t:0}); shotsLeft-- }
  function draw() {
    frame++
    ctx.fillStyle='#0f4f0f'; ctx.fillRect(0,0,W,H)
    ctx.fillStyle='#1a3a5c'; ctx.fillRect(0,H-100,W,100)
    ships.forEach(s=>{ s.y+=1.5; if(s.y>H) { ships.splice(ships.indexOf(s),1); spawnShip() }; ctx.font='28px serif'; ctx.textAlign='center'; ctx.fillText('🚢',s.x+s.w/2,s.y+s.h/2) })
    for(let i=projectiles.length-1;i>=0;i--) { const p=projectiles[i]; p.t+=0.1; const py=p.y+(p.ty-p.y)*p.t; ctx.beginPath(); ctx.arc(p.x,py,4,0,Math.PI*2); ctx.fillStyle='#ffb800'; ctx.fill(); if(p.t>=1) { projectiles.splice(i,1); ships.forEach(s=>{ if(!s.hit && Math.abs(s.x+s.w/2-p.x)<s.w/2 && Math.abs(s.y+s.h/2-py)<s.h/2) { s.hit=true; hits++; launchConfetti(); ships.splice(ships.indexOf(s),1); spawnShip() } }) } }
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,36)
    ctx.fillStyle='#f0a000'; ctx.font='bold 15px Nunito'; ctx.textAlign='center'
    ctx.fillText(`🏴‍☠️ ${hits} skibe sænket · ${shotsLeft} skud tilbage`,W/2,23)
    if(shotsLeft<=0 && projectiles.length===0) {
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,H/2-50,W,100)
      ctx.fillStyle='#f0a000'; ctx.font='bold 22px Fredoka One'; ctx.textAlign='center'
      ctx.fillText(`🏴‍☠️ ${hits} skibe sænket!`,W/2,H/2-10)
      ctx.fillStyle='#fff'; ctx.font='14px Nunito'; ctx.fillText('Tryk for at spille igen',W/2,H/2+24)
      canvas.onclick=()=>{ shotsLeft=shots; hits=0; ships=[]; for(let i=0;i<3;i++) spawnShip(); projectiles=[] }
    }
    gameLoop=requestAnimationFrame(draw)
  }
  gameLoop=requestAnimationFrame(draw)
}

// ── ROCKET ──
function runRocket(canvas, ctx, power) {
  const W=canvas.width, H=canvas.height
  let rocket={x:W/2,y:H-60}, alive=true, score=0, frame=0
  const asteroids=[], stars=[]
  const speed=1.5+power*2
  for(let i=0;i<30;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5})
  for(let i=0;i<5;i++) asteroids.push({x:Math.random()*W,y:-50-i*80,r:15+Math.random()*20,s:speed+Math.random()})
  canvas.addEventListener('mousemove',e=>{ const r=canvas.getBoundingClientRect(); rocket.x=(e.clientX-r.left)*(W/r.width) },{passive:true})
  canvas.addEventListener('touchmove',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); rocket.x=(e.touches[0].clientX-r.left)*(W/r.width) },{passive:false})
  function draw() {
    frame++
    ctx.fillStyle='#010118'; ctx.fillRect(0,0,W,H)
    stars.forEach(s=>{ ctx.beginPath(); ctx.arc((s.x+frame*0.2)%W,s.y,s.s,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill() })
    if(alive) score++
    asteroids.forEach(a=>{ a.y+=a.s; if(a.y>H+40){ a.y=-40; a.x=Math.random()*W }; ctx.font=`${a.r*1.5}px serif`; ctx.textAlign='center'; ctx.fillText('🌑',a.x,a.y); if(alive&&Math.hypot(rocket.x-a.x,rocket.y-a.y)<a.r+12) alive=false })
    ctx.font='40px serif'; ctx.fillText('🚀',rocket.x,rocket.y)
    ctx.fillStyle=`rgba(0,200,255,${0.3+Math.sin(frame*0.3)*0.2})`; ctx.beginPath(); ctx.ellipse(rocket.x,rocket.y+28,8,12+Math.sin(frame*0.4)*4,0,0,Math.PI*2); ctx.fill()
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,36)
    ctx.fillStyle='#00e5ff'; ctx.font='bold 15px Nunito'; ctx.textAlign='center'
    ctx.fillText(`💎 ${Math.floor(score/10)} · Bevæg for at undvige!`,W/2,23)
    if(!alive) {
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,H/2-50,W,100)
      ctx.fillStyle='#00e5ff'; ctx.font='bold 22px Fredoka One'; ctx.textAlign='center'
      ctx.fillText(`🚀 ${Math.floor(score/10)} krystaller!`,W/2,H/2-10)
      ctx.fillStyle='#fff'; ctx.font='14px Nunito'; ctx.fillText('Tryk for at starte igen',W/2,H/2+24)
      canvas.onclick=()=>{ rocket={x:W/2,y:H-60}; alive=true; score=0; asteroids.forEach((a,i)=>{ a.y=-50-i*80; a.x=Math.random()*W }) }
    }
    gameLoop=requestAnimationFrame(draw)
  }
  gameLoop=requestAnimationFrame(draw)
}

// ── SUPERHERO ──
function runSuperhero(canvas, ctx, power) {
  const W=canvas.width, H=canvas.height
  const shots=Math.round(8+power*8)
  let shotsLeft=shots, zapped=0, frame=0
  let hero={x:W/2,y:H-60}
  const villains=[], lasers=[]
  for(let i=0;i<4;i++) villains.push({x:60+i*(W-80)/3,y:80+Math.random()*100,alive:true,dx:(Math.random()-0.5)*2.5,emoji:['👿','🤖','👾','🦹'][i]})
  canvas.onclick=(e)=>{
    if(shotsLeft<=0) return
    const r=canvas.getBoundingClientRect()
    const tx=(e.clientX-r.left)*(W/r.width), ty=(e.clientY-r.top)*(H/r.height)
    lasers.push({x:hero.x,y:hero.y-20,tx,ty,t:0})
    shotsLeft--
  }
  function draw() {
    frame++
    const grd=ctx.createLinearGradient(0,0,0,H)
    grd.addColorStop(0,'#0a0020'); grd.addColorStop(1,'#400010')
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H)
    ctx.fillStyle='#1a0030'
    const buildings=[[0,60],[60,100],[100,40],[160,80],[200,50],[240,90],[290,60],[330,110],[370,70],[430,50]]
    buildings.forEach(([bx,bh])=>{ ctx.fillRect(bx,H-bh-40,40,bh) })
    villains.forEach(v=>{ if(!v.alive) return; v.x+=v.dx; if(v.x<20||v.x>W-20) v.dx*=-1; ctx.font='38px serif'; ctx.textAlign='center'; ctx.fillText(v.emoji,v.x,v.y) })
    for(let i=lasers.length-1;i>=0;i--) {
      const l=lasers[i]; l.t+=0.12
      const lx=l.x+(l.tx-l.x)*l.t, ly=l.y+(l.ty-l.y)*l.t
      ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(lx,ly)
      ctx.strokeStyle='rgba(255,50,100,0.8)'; ctx.lineWidth=3; ctx.stroke()
      ctx.beginPath(); ctx.arc(lx,ly,6,0,Math.PI*2); ctx.fillStyle='#ff2060'; ctx.fill()
      if(l.t>=1) {
        lasers.splice(i,1)
        villains.forEach(v=>{ if(v.alive&&Math.hypot(v.x-l.tx,v.y-l.ty)<30){ v.alive=false; zapped++; launchConfetti(); if(villains.every(v=>!v.alive)) villains.forEach((v,j)=>{ v.alive=true; v.x=60+j*(W-80)/3 }) }})
      }
    }
    ctx.font='44px serif'; ctx.fillText('🦸',hero.x,hero.y)
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,36)
    ctx.fillStyle='#ff2060'; ctx.font='bold 15px Nunito'; ctx.textAlign='center'
    ctx.fillText(`⚡ ${zapped} skurke · 💥 ${shotsLeft} skud tilbage`,W/2,23)
    if(shotsLeft<=0&&lasers.length===0) {
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,H/2-50,W,100)
      ctx.fillStyle='#ff2060'; ctx.font='bold 22px Fredoka One'; ctx.textAlign='center'
      ctx.fillText(`🦸 ${zapped} skurke besejret!`,W/2,H/2-10)
      ctx.fillStyle='#fff'; ctx.font='14px Nunito'; ctx.fillText('Tryk for at starte igen',W/2,H/2+24)
      canvas.onclick=()=>{ shotsLeft=shots; zapped=0; lasers.length=0; villains.forEach((v,j)=>{ v.alive=true; v.x=60+j*(W-80)/3 }) }
    }
    gameLoop=requestAnimationFrame(draw)
  }
  gameLoop=requestAnimationFrame(draw)
}

function showResult(msg) {
  document.getElementById('game-info').textContent = msg
  document.getElementById('play-btn').style.display='block'
  document.getElementById('play-btn').textContent='🔄 Spil igen'
}

// ════════════════════════════════════════
// CONFETTI
// ════════════════════════════════════════
function launchConfetti() {
  const canvas=document.getElementById('confetti-canvas')
  const ctx=canvas.getContext('2d')
  canvas.width=window.innerWidth; canvas.height=window.innerHeight
  const pieces=[]
  const colors=['#FFB800','#FF7D6E','#6BC5F8','#7EDDB8','#B8A9F8','#FFE066','#FF2060','#00E5FF']
  for(let i=0;i<100;i++) pieces.push({
    x:Math.random()*canvas.width, y:-20-Math.random()*200,
    r:5+Math.random()*7, color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-0.5)*6, vy:3+Math.random()*4,
    va:(Math.random()-0.5)*0.2, angle:Math.random()*Math.PI*2
  })
  let f=0
  const anim=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height)
    pieces.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.angle+=p.va; p.vy+=0.1
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle)
      ctx.fillStyle=p.color; ctx.fillRect(-p.r/2,-p.r/4,p.r,p.r/2); ctx.restore()
    })
    f++; if(f<120) requestAnimationFrame(anim); else ctx.clearRect(0,0,canvas.width,canvas.height)
  }
  requestAnimationFrame(anim)
}
